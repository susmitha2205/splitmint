{% extends 'base.html' %}
{% block title %}Delete Group — SplitMint{% endblock %}
{% block content %}
<div class="container-xl py-4" style="max-width:520px">
  <div class="sm-card text-center p-5">
    <div class="sm-delete-icon mb-3"><i class="bi bi-trash3-fill"></i></div>
    <h4>Delete "{{ group.name }}"?</h4>
    <p class="text-muted">This will permanently delete the group and all its expenses. This action cannot be undone.</p>
    <form method="post" class="d-flex gap-3 justify-content-center mt-4">
      {% csrf_token %}
      <button type="submit" class="btn sm-btn-danger px-4">
        <i class="bi bi-trash me-1"></i>Yes, Delete
      </button>
      <a href="{% url 'group_detail' group.pk %}" class="btn sm-btn-ghost px-4">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
