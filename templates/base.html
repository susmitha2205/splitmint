{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SplitMint{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% include 'navbar.html' %}

  <div class="sm-page-wrapper">
    {% if messages %}
      <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999">
        {% for message in messages %}
          <div class="toast align-items-center text-white border-0 show
            {% if message.tags == 'success' %}bg-success
            {% elif message.tags == 'error' %}bg-danger
            {% elif message.tags == 'warning' %}bg-warning text-dark
            {% else %}bg-info{% endif %}"
            role="alert" data-bs-autohide="true" data-bs-delay="4000">
            <div class="d-flex">
              <div class="toast-body fw-500">{{ message }}</div>
              <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <main class="sm-main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
