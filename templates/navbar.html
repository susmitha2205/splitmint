{% load static %}
<nav class="navbar navbar-expand-lg sm-navbar">
  <div class="container-xl">
    <a class="navbar-brand sm-brand" href="{% url 'home' %}">
      <span class="sm-brand-icon"><i class="bi bi-lightning-charge-fill"></i></span>
      SplitMint
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      {% if user.is_authenticated %}
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
             href="{% url 'dashboard' %}">
            <i class="bi bi-grid-1x2-fill me-1"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'group' in request.resolver_match.url_name %}active{% endif %}"
             href="{% url 'group_list' %}">
            <i class="bi bi-people-fill me-1"></i> Groups
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'parse_expense' %}active{% endif %}"
             href="{% url 'parse_expense' %}">
            <i class="bi bi-stars me-1"></i> MintSense AI
          </a>
        </li>
      </ul>
      <div class="navbar-nav ms-auto align-items-center gap-2">
        <span class="nav-text sm-user-chip">
          <i class="bi bi-person-circle me-1"></i>
          {{ user.first_name|default:user.username }}
        </span>
        <a href="{% url 'logout' %}" class="btn sm-btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
      </div>
      {% else %}
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
        <li class="nav-item"><a class="btn sm-btn-primary btn-sm ms-2" href="{% url 'register' %}">Sign Up Free</a></li>
      </ul>
      {% endif %}
    </div>
  </div>
</nav>
